services:
  postgres:
    image: postgres:16-alpine
    container_name: opp-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opportunities}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-opportunities}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opportunities}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/runberg/opportunities:latest
    container_name: opp-app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-opportunities}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-opportunities}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
      NODE_ENV: production
    volumes:
      - ./data/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: opp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
